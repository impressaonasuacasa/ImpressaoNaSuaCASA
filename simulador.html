<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Preços – Impressão na Sua Casa | Guarujá</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para compilação em tempo de execução das tags JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Fontes do Google -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            brand: {
              blue: '#2563EB',
              dark: '#0F172A',
            }
          },
          boxShadow: {
            '2xs': '0 1px 2px rgba(0, 0, 0, 0.03)',
            '3xs': '0 1px 1px rgba(0, 0, 0, 0.02)',
          },
          animation: {
            'float': 'float 3s ease-in-out infinite',
            'pulse-soft': 'pulse 2.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>

  <style type="text/css">
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
    html {
      scroll-behavior: smooth;
    }
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(241, 245, 249, 0.5);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(203, 213, 225, 1);
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 1);
    }

    .app-container {
      display: grid;
      grid-template-columns: 360px 1fr 340px;
      min-height: calc(100vh - 64px);
      background-color: #0B0F19;
      color: #E2E8F0;
    }
    .left-preview {
      background-color: #070A12;
      border-right: 1px solid rgba(255, 255, 255, 0.05);
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-y: auto;
    }
    .middle-configurator {
      padding: 32px;
      overflow-y: auto;
      background-color: #0B0F19;
    }
    .right-cart {
      background-color: #070A12;
      border-left: 1px solid rgba(255, 255, 255, 0.05);
      padding: 24px;
      display: flex;
      flex-direction: column;
      height: calc(100vh - 64px);
      position: sticky;
      top: 64px;
    }

    #benefit-toast {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(16, 185, 129, 0.95);
      backdrop-filter: blur(8px);
      color: white;
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.3);
      display: flex;
      align-items: center;
      z-index: 100;
    }

    #cart-toast {
      position: fixed;
      bottom: 24px;
      left: 24px;
      background: rgba(37, 99, 235, 0.95);
      backdrop-filter: blur(8px);
      color: white;
      font-weight: 800;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 12px 18px;
      border-radius: 12px;
      box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
      display: flex;
      align-items: center;
      z-index: 100;
    }
  </style>
</head>
<body class="bg-[#FAFBFD] text-slate-800 antialiased font-sans">
  
  <div id="root"></div>

  <!-- Código React interpretado pelo Babel -->
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const WPP_NUMBER = '5513997674140';

    function getWppLink(msg) {
      return `https://wa.me/${WPP_NUMBER}?text=${encodeURIComponent(msg)}`;
    }

    function formatCurrency(n) {
      return n.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function formatNumber(n) {
      return n.toLocaleString('pt-BR');
    }

    /* VERIFICADOR HORÁRIO DE ATENDIMENTO */
    function checkAtendimento() {
      try {
        const spTimeStr = new Date().toLocaleString('en-US', {
          timeZone: 'America/Sao_Paulo',
          hour: 'numeric',
          minute: 'numeric',
          hour12: false,
          weekday: 'short',
        });
        const parts = spTimeStr.split(', ');
        const day = parts[0].toLowerCase();
        const timeParts = parts[1].split(':');
        const h = parseInt(timeParts[0], 10);
        const m = parseInt(timeParts[1], 10);
        
        return calculateTimeState(day, h, m);
      } catch (e) {
        const d = new Date();
        const brt = new Date(d.getTime() - 180 * 60000); // UTC-3 para fallback
        const days = ['sun', 'mon', 'tue', 'wed', 'thu', 'fri', 'sat'];
        const day = days[brt.getUTCDay()];
        const h = brt.getUTCHours();
        const m = brt.getUTCMinutes();
        
        return calculateTimeState(day, h, m);
      }
    }

    function calculateTimeState(day, h, m) {
      const time = h + m / 60;
      const weekdays = ['mon', 'tue', 'wed', 'thu', 'fri'];
      let isOnline = false;

      if (weekdays.indexOf(day) !== -1) {
        isOnline = time >= 9 && time < 17;
      } else if (day === 'sat') {
        isOnline = time >= 10 && time < 16;
      }

      let nextOpenText = '';
      if (weekdays.indexOf(day) !== -1) {
        if (h < 9) nextOpenText = 'hoje às 9h';
        else if (day === 'fri') nextOpenText = 'sábado às 10h';
        else nextOpenText = 'amanhã às 9h';
      } else if (day === 'sat') {
        if (h < 10) nextOpenText = 'hoje às 10h';
        else nextOpenText = 'segunda-feira às 9h';
      } else {
        nextOpenText = 'segunda-feira às 9h';
      }

      const statusText = isOnline 
        ? 'Online agora · Respondemos rapidamente' 
        : `Offline · Retornamos ${nextOpenText}`;

      return { isOnline, statusText, nextOpenText };
    }

    /* MATRIZ DE PREÇOS */
    const A4_TIERS = [
      { min: 20, max: 30, p: 1.90 },
      { min: 31, max: 50, p: 1.75 },
      { min: 51, max: 80, p: 1.45 },
      { min: 81, max: 100, p: 1.25 },
      { min: 101, max: 200, p: 1.00 },
      { min: 201, max: 500, p: 0.80 },
      { min: 501, max: Infinity, p: 0.65 },
    ];

    function getA4UnitPrice(q) {
      for (const tier of A4_TIERS) {
        if (q >= tier.min && q <= tier.max) return tier.p;
      }
      return 0.65;
    }

    const CV_PRICES = {
      'Básica': {
        'Frente': { 500: 89.90, 1000: 129.90, 2000: 219.90, 3000: 299.90, 5000: 449.90 },
        'Frente e Verso': { 500: 109.90, 1000: 149.90, 2000: 249.90, 3000: 339.90, 5000: 519.90 },
      },
      'Premium': {
        'Frente': { 500: 169.90, 1000: 269.90, 5000: 699.90 },
        'Frente e Verso': { 500: 199.90, 1000: 319.90, 5000: 799.90 },
      },
    };

    const PF_PRICES = {
      'Econômica': {
        'Frente': { 1000: 199.90, 2500: 249.90, 5000: 349.90 },
        'Frente e Verso': { 1000: 279.90, 2500: 399.90, 5000: 649.90 },
      },
      'Premium': {
        'Frente': { 250: 189.90, 500: 279.90, 1000: 329.90, 2500: 349.90, 5000: 589.90 },
        'Frente e Verso': { 250: 259.90, 500: 389.90, 1000: 449.90, 2500: 599.90, 5000: 899.90 },
      },
    };

    const ESP_DATA = {
      foto: {
        name: 'Fotográfico',
        description: 'Brilho intenso · Cores vibrantes',
        getTiers: (g = 180) => {
          const extra = g === 230 ? 1.00 : 0;
          return [
            { min: 1, max: 1, p: Math.round((7.90 + extra) * 100) / 100 },
            { min: 2, max: 4, p: Math.round((6.90 + extra) * 100) / 100 },
            { min: 5, max: Infinity, p: Math.round((5.90 + extra) * 100) / 100 },
          ];
        },
        getFreteMin: () => 5,
      },
      matte: {
        name: 'Matte',
        description: 'Fosco elegante · Sem reflexo · 220g',
        getTiers: () => [
          { min: 1, max: 1, p: 6.90 },
          { min: 2, max: 4, p: 5.90 },
          { min: 8, max: Infinity, p: 4.90 },
        ],
        getFreteMin: () => 8,
      },
      canson: {
        name: 'Canson',
        description: 'Textura especial · Ideal para arte',
        getTiers: () => [
          { min: 1, max: 1, p: 5.90 },
          { min: 2, max: 4, p: 4.90 },
          { min: 8, max: Infinity, p: 4.90 },
        ],
        getFreteMin: () => 8,
      },
      adesivo: {
        name: 'Adesivo',
        description: 'Autoadesivo · Alta qualidade · 130g',
        getTiers: () => [
          { min: 1, max: 1, p: 7.90 },
          { min: 2, max: 4, p: 6.90 },
          { min: 5, max: Infinity, p: 5.90 },
        ],
        getFreteMin: () => 5,
      },
    };

    function getEspUnitPrice(tipo, gram, qty) {
      const config = ESP_DATA[tipo];
      if (!config) return 0;
      const tiers = config.getTiers(gram);
      for (const tier of tiers) {
        if (qty >= tier.min && qty <= tier.max) return tier.p;
      }
      return tiers[tiers.length - 1].p;
    }

    function buildSingleWppMessage(item) {
      if (item.product === 'a4') {
        return `📄 Olá! Quero orçamento de Impressão A4:\n\n• Tipo: ${item.meta.tipo}\n• Quantidade: ${formatNumber(item.qty)} impressões\n• Valor estimado: R$ ${formatCurrency(item.total)}\n\nTenho o arquivo pronto. Podem confirmar prazo e entrega?`;
      } else if (item.product === 'cartao') {
        return `💼 Olá! Quero orçamento de Cartão de Visita:\n\n• Linha: ${item.meta.linha}\n• Quantidade: ${formatNumber(item.qty)} unidades\n• Impressão: ${item.meta.lado}\n• Valor estimado: R$ ${formatCurrency(item.total)}\n\nTenho o arquivo pronto. Podem confirmar prazo e entrega no Guarujá?`;
      } else if (item.product === 'panfleto') {
        return `📢 Olá! Quero orçamento de Panfleto A6:\n\n• Linha: ${item.meta.linha}\n• Quantidade: ${formatNumber(item.qty)} unidades\n• Impressão: ${item.meta.lado}\n• Valor estimado: R$ ${formatCurrency(item.total)}\n\nTenho o arquivo pronto. Podem confirmar prazo e entrega no Guarujá?`;
      } else {
        const nome = item.meta.tipo === 'foto' ? `Fotográfico ${item.meta.gram}g` : ESP_DATA[item.meta.tipo || 'foto']?.name || 'Papel Especial';
        const freteMin = ESP_DATA[item.meta.tipo || 'foto']?.getFreteMin() || 5;
        const freteTxt = item.qty >= freteMin ? ' (frete grátis)' : '';
        return `🖼️ Olá! Quero orçamento de Impressão Especial:\n\n• Papel: ${nome}\n• Quantidade: ${item.qty} folha${item.qty > 1 ? 's' : ''}\n• Valor estimado: R$ ${formatCurrency(item.total)}${freteTxt}\n\nTenho o arquivo pronto. Podem confirmar prazo e entrega no Guarujá?`;
      }
    }

    function buildCartWppMessage(items) {
      let total = 0;
      items.forEach(item => { total += item.total; });
      
      let msg = 'Olá! Gostaria de solicitar um orçamento.\n\n📋 *Itens do meu pedido:*\n\n';
      items.forEach((item, i) => {
        msg += `${i + 1}. *${item.name}*\n`;
        msg += `   • ${item.specs.join(' · ')}\n`;
        msg += `   • Valor: R$ ${formatCurrency(item.total)}\n\n`;
      });
      msg += `💰 *Valor estimado total: R$ ${formatCurrency(total)}*\n\n`;
      msg += 'Aguardo confirmação de prazo e entrega. Obrigado!';
      return msg;
    }

    /* PERGUNTAS FREQUENTES */
    const FAQ_ITEMS = [
      {
        q: 'Preciso ter o arquivo pronto para pedir?',
        a: 'Não necessariamente! Você pode entrar em contato mesmo sem o arquivo. Porém, ter o arquivo pronto agiliza bastante — a produção começa assim que aprovamos o layout. Se precisar de ajuda com a arte, fale com a gente e orientamos.'
      },
      {
        q: 'Qual o prazo de entrega?',
        a: 'Cartões de visita e panfletos têm produção de 4 a 7 dias úteis após aprovação — e muitas vezes entregamos antes! Impressão A4 costuma ser mais rápida. O prazo exato é informado no momento do orçamento.'
      },
      {
        q: 'Como funciona o pagamento?',
        a: 'Trabalhamos com Pix — rápido, seguro e sem taxas extras. O pagamento é combinado após a aprovação do orçamento e antes do início da produção.'
      },
      {
        q: 'Entregam no meu bairro em Guarujá?',
        a: 'Atendemos a maioria dos bairros do Guarujá com frete grátis! Entre em contato informando seu bairro e confirmamos na hora. As chances são grandes de você estar na nossa área de entrega. 🚚'
      },
      {
        q: 'Como envio o arquivo para vocês?',
        a: 'Tudo pelo WhatsApp! Você manda o arquivo direto na conversa — PDF, JPG, PNG, qualquer formato. A gente analisa e já te passa o orçamento.'
      },
      {
        q: 'Frente e verso conta como 2 impressões?',
        a: 'Sim! Para Impressão A4, frente e verso são cobrados como 2 impressões (1 folha física = 2 impressões). Para cartões e panfletos, frente e verso têm um preço específico já exibido no simulador.'
      },
      {
        q: 'Posso pedir uma amostra antes do pedido maior?',
        a: 'Para cartões e panfletos, você aprova o arquivo digital antes de imprimir. Para impressão A4 e papéis especiais, é possível pedir quantidades menores para testar. Fale com a gente e encontramos a melhor solução!'
      }
    ];

    function FaqSection({ isMobileView = false }) {
      const [openIndex, setOpenIndex] = useState(null);
      const toggle = (idx) => setOpenIndex(openIndex === idx ? null : idx);

      if (isMobileView) {
        return (
          <div className="mt-12 bg-white rounded-2xl p-5 border border-slate-100 shadow-sm">
            <span className="text-xs font-bold uppercase tracking-wider text-blue-600 mb-1 block">Tire suas dúvidas</span>
            <h3 className="text-xl font-black text-slate-800 mb-6 font-display">Perguntas frequentes</h3>
            <div className="space-y-3">
              {FAQ_ITEMS.map((item, idx) => {
                const isOpen = openIndex === idx;
                return (
                  <div 
                    key={idx} 
                    className={`border rounded-xl transition-all duration-300 overflow-hidden ${
                      isOpen ? 'border-blue-600/30 bg-blue-50/20' : 'border-slate-100 bg-white'
                    }`}
                  >
                    <button
                      type="button"
                      onClick={() => toggle(idx)}
                      className="w-full text-left py-4 px-4 font-semibold text-slate-700 text-sm flex items-center justify-between gap-3 focus:outline-none"
                    >
                      <span>{item.q}</span>
                      <span className={`text-lg font-bold shrink-0 transition-transform duration-300 text-blue-600 ${isOpen ? 'rotate-45' : ''}`}>
                        ＋
                      </span>
                    </button>
                    <div 
                      className="transition-all duration-300 ease-in-out overflow-hidden"
                      style={{ maxHeight: isOpen ? '250px' : '0', opacity: isOpen ? 1 : 0 }}
                    >
                      <div className="px-4 pb-4 pt-1 text-slate-500 text-xs leading-relaxed border-t border-slate-50">
                        {item.a}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      }

      return (
        <div className="border-t border-slate-800 pt-12 mt-16 pb-16">
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div>
              <p className="text-xs font-bold uppercase tracking-wider text-blue-500 mb-1">Tire suas dúvidas</p>
              <h2 className="text-3xl font-black text-white font-display">Perguntas<br/><span className="text-blue-500">frequentes</span></h2>
              <p className="text-slate-400 text-xs mt-3 leading-relaxed">Respondemos as dúvidas mais comuns para você fechar o pedido com confiança. Não achou a sua?</p>
              <div className="mt-6 bg-slate-900 border border-slate-800 rounded-2xl p-5">
                <p className="text-xs text-slate-300 font-medium">Ainda tem dúvida?<br/>Fala com a gente direto no WhatsApp.</p>
                <a 
                  href={getWppLink('Olá! Tenho uma dúvida sobre o pedido.')}
                  target="_blank" 
                  rel="noopener" 
                  className="mt-3 w-full bg-[#25D366] text-white py-2.5 px-4 rounded-xl text-xs font-bold flex items-center justify-center gap-1.5 hover:bg-emerald-500 transition-colors"
                >
                  Perguntar no WhatsApp
                </a>
              </div>
            </div>
            
            <div className="md:col-span-2 space-y-4">
              {FAQ_ITEMS.map((item, idx) => {
                const isOpen = openIndex === idx;
                return (
                  <div key={idx} className="border-b border-slate-800 pb-4">
                    <button 
                      type="button" 
                      className="w-full text-left font-bold text-white text-sm flex items-center justify-between gap-4 py-2 focus:outline-none" 
                      onClick={() => toggle(idx)}
                    >
                      <span>{item.q}</span>
                      <span className={`text-blue-500 text-lg transition-transform ${isOpen ? 'rotate-45' : ''}`}>+</span>
                    </button>
                    <div 
                      className="transition-all duration-300 overflow-hidden"
                      style={{ maxHeight: isOpen ? '200px' : '0', opacity: isOpen ? 1 : 0 }}
                    >
                      <p className="text-slate-400 text-xs leading-relaxed pt-2">
                        {item.a}
                      </p>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    /* COMPONENTE PRINCIPAL (MainApp) */
    function MainApp() {
      const [isMobileLayout, setIsMobileLayout] = useState(window.innerWidth < 1024);

      useEffect(() => {
        const handleResize = () => setIsMobileLayout(window.innerWidth < 1024);
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      const [activeTab, setActiveTab] = useState('a4');

      // Estado do carrinho persistido no localStorage
      const [cart, setCart] = useState(() => {
        try {
          const saved = localStorage.getItem('sim_cart_standalone');
          if (saved) {
            const data = JSON.parse(saved);
            return data.items || [];
          }
        } catch (e) {}
        return [];
      });

      const [cartIdCounter, setCartIdCounter] = useState(() => {
        try {
          const saved = localStorage.getItem('sim_cart_standalone');
          if (saved) {
            const data = JSON.parse(saved);
            return data.counter || 0;
          }
        } catch (e) {}
        return 0;
      });

      // Estados de configuração
      const [a4Tipo, setA4Tipo] = useState('Colorida');
      const [a4Qty, setA4Qty] = useState(20);

      const [cvLinha, setCvLinha] = useState('Básica');
      const [cvLado, setCvLado] = useState('Frente');
      const [cvQty, setCvQty] = useState(500);

      const [pfLinha, setPfLinha] = useState('Econômica');
      const [pfLado, setPfLado] = useState('Frente');
      const [pfQty, setPfQty] = useState(1000);

      const [espTipo, setEspTipo] = useState('foto');
      const [espGram, setEspGram] = useState(180);
      const [espQty, setEspQty] = useState(1);

      const [cartOpen, setCartOpen] = useState(false);
      const [confirmClear, setConfirmClear] = useState(false);
      const [atendimento, setAtendimento] = useState(() => checkAtendimento());

      useEffect(() => {
        const timer = setInterval(() => setAtendimento(checkAtendimento()), 30000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        localStorage.setItem('sim_cart_standalone', JSON.stringify({ items: cart, counter: cartIdCounter }));
      }, [cart, cartIdCounter]);

      const triggerBenefitToast = (icon, msg) => {
        if (window.triggerBenefitToastJS) {
          window.triggerBenefitToastJS(icon, msg);
        }
      };

      const triggerCartToast = (msg) => {
        if (window.triggerCartToastJS) {
          window.triggerCartToastJS(msg);
        }
      };

      // Gatilho de ofertas para o A4
      useEffect(() => {
        const currentPrice = getA4UnitPrice(a4Qty);
        let msg = '';
        let icon = '📉';
        if (currentPrice === 1.75) msg = 'Nova faixa! R$ 1,75 por impressão';
        else if (currentPrice === 1.45) { msg = 'Faixa bronze! R$ 1,45 por impressão'; icon = '🎉'; }
        else if (currentPrice === 1.25) { msg = 'Ótimo pedido! R$ 1,25 por impressão'; icon = '⭐'; }
        else if (currentPrice === 1.00) { msg = 'Melhor custo-benefício! R$ 1,00 cada'; icon = '🏆'; }
        else if (currentPrice === 0.80) { msg = 'Preço atacado! R$ 0,80 por impressão'; icon = '💎'; }
        else if (currentPrice === 0.65) { msg = 'Preço máximo ouro! R$ 0,65 por impressão'; icon = '🚀'; }

        if (msg) triggerBenefitToast(icon, msg);
      }, [a4Qty]);

      // Ações do carrinho
      const handleAddToCart = (stateItem) => {
        const nextId = cartIdCounter + 1;
        const newItem = { ...stateItem, id: nextId };
        setCartIdCounter(nextId);
        setCart(prev => [...prev, newItem]);
        triggerCartToast(`✅ ${stateItem.name} adicionado!`);
      };

      const handleRemoveFromCart = (id) => {
        setCart(prev => prev.filter(item => item.id !== id));
      };

      const handleEditCartItem = (id) => {
        const target = cart.find(item => item.id === id);
        if (!target) return;
        setCart(prev => prev.filter(item => item.id !== id));

        setActiveTab(target.product);
        const m = target.meta || {};

        if (target.product === 'a4') {
          if (m.tipo) setA4Tipo(m.tipo);
          if (m.qty) setA4Qty(m.qty);
        } else if (target.product === 'cartao') {
          if (m.linha) setCvLinha(m.linha);
          if (m.lado) setCvLado(m.lado);

                                {key === 'matte' && '🎨'}
                                {key === 'canson' && '🖌️'}
                                {key === 'adesivo' && '📌'}
                              </span>
                              <span className="text-[10px] font-extrabold text-white block">{conf.name}</span>
                              <span className="text-[8px] text-slate-400 block leading-tight mt-0.5 line-clamp-1">{conf.description}</span>
                            </button>
                          );
                        })}
                      </div>

                      {espTipo === 'foto' && (
                        <div className="bg-slate-900/60 p-4 rounded-xl border border-white/5">
                          <span className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400 block mb-3">Gramatura do Papel Fotográfico</span>
                          <div className="flex gap-3">
                            <button onClick={() => setEspGram(180)} className={`flex-1 py-2.5 rounded-xl text-xs font-bold ${espGram === 180 ? 'bg-blue-600 text-white' : 'bg-slate-950 text-slate-400'}`}>180g (Padrão)</button>
                            <button onClick={() => setEspGram(230)} className={`flex-1 py-2.5 rounded-xl text-xs font-bold ${espGram === 230 ? 'bg-blue-600 text-white' : 'bg-slate-950 text-slate-400'}`}>230g (+R$ 1,00 cada)</button>
                          </div>
                        </div>
                      )}
                    </>
                  )}

                  {/* SELEÇÃO DE QUANTIDADE DETALHADA */}
                  <div className="bg-slate-900/60 p-4 rounded-xl border border-white/5">
                    <span className="text-[10px] font-extrabold uppercase tracking-widest text-slate-400 block mb-3">Volume Solicitado</span>
                    
                    {(activeTab === 'a4' || activeTab === 'especial') ? (
                      <div className="flex items-center gap-4">
                        <div className="flex items-center bg-slate-950 border border-white/5 rounded-xl p-1">
                          <button
                            onClick={() => {
                              if (activeTab === 'a4') setA4Qty(Math.max(20, a4Qty - 1));
                              else setEspQty(Math.max(1, espQty - 1));
                            }}
                            className="w-9 h-9 rounded-lg bg-slate-900 text-blue-500 font-bold"
                          >
                            −
                          </button>
                          <input
                            type="number"
                            className="w-20 text-center font-bold text-white bg-transparent focus:outline-none text-xs"
                            value={activeTab === 'a4' ? a4Qty : espQty}
                            onChange={(e) => {
                              const val = parseInt(e.target.value, 10);
                              if (activeTab === 'a4') setA4Qty(isNaN(val) ? 20 : val);
                              else setEspQty(isNaN(val) ? 1 : val);
                            }}
                          />
                          <button
                            onClick={() => {
                              if (activeTab === 'a4') setA4Qty(a4Qty + 1);
                              else setEspQty(espQty + 1);
                            }}
                            className="w-9 h-9 rounded-lg bg-slate-900 text-blue-500 font-bold"
                          >
                            +
                          </button>
                        </div>

                        {/* Atalhos Rápidos */}
                        <div className="flex gap-1">
                          {activeTab === 'a4' ? (
                            [20, 50, 100, 200, 500].map(q => (
                              <button key={q} onClick={() => setA4Qty(q)} className={`px-2.5 py-1.5 rounded-lg border text-[9px] font-bold ${a4Qty === q ? 'border-blue-500 text-white bg-blue-500/10' : 'border-white/5 bg-slate-950 text-slate-400'}`}>{q}</button>
                            ))
                          ) : (
                            [1, 3, 5, 8, 10, 20].map(q => (
                              <button key={q} onClick={() => setEspQty(q)} className={`px-2.5 py-1.5 rounded-lg border text-[9px] font-bold ${espQty === q ? 'border-blue-500 text-white bg-blue-500/10' : 'border-white/5 bg-slate-950 text-slate-400'}`}>{q}</button>
                            ))
                          )}
                        </div>
                      </div>
                    ) : (
                      <div className="flex flex-wrap gap-2">
                        {(activeTab === 'cartao' ? cvQtds : pfQtds).map(q => {
                          const sel = (activeTab === 'cartao' ? cvQty : pfQty) === q;
                          return (
                            <button
                              key={q}
                              onClick={() => {
                                if (activeTab === 'cartao') setCvQty(q);
                                else setPfQty(q);
                              }}
                              className={`py-2 px-3 rounded-lg text-xs font-mono font-bold border transition-colors ${
                                sel ? 'bg-blue-600 border-blue-500 text-white shadow-md' : 'bg-slate-950 border-white/5 text-slate-400 hover:text-white'
                              }`}
                            >
                              {formatNumber(q)} un
                            </button>
                          );
                        })}
                      </div>
                    )}
                  </div>

                  {/* BARRA DE PROGRESSO DO DESCONTO PROGRESSIVO */}
                  <div className="border-t border-white/5 pt-5">
                    <div className="flex items-center justify-between mb-1.5">
                      <span className="text-[9px] font-extrabold uppercase tracking-widest text-slate-400">Progresso do Desconto Ativo</span>
                      <span className="text-[9px] font-mono font-bold text-blue-500 bg-blue-500/10 px-2 py-0.5 rounded">R$ {formatCurrency(activeTab === 'a4' ? a4Unit : activeTab === 'cartao' ? cvUnit : activeTab === 'panfleto' ? pfUnit : espUnit)} / un</span>
                    </div>
                    <div className="relative h-2 bg-slate-900 border border-white/5 rounded-full overflow-hidden mt-2">
                      <div className="absolute top-0 bottom-0 left-0 bg-gradient-to-r from-blue-600 to-emerald-400 transition-all duration-500" style={{ width: `${activeProgress.pct}%` }}></div>
                    </div>
                    <p className="text-[10px] text-emerald-400 font-bold mt-2 font-mono flex items-center gap-1.5">
                      <span>💡</span> {activeProgress.msg}
                    </p>
                  </div>

                </div>
              </div>

              {/* FAQ */}
              <FaqSection isMobileView={false} />
            </main>

            {/* CARRINHO DE ORÇAMENTOS (DIREITA) */}
            <aside className="right-cart">
              <span className="text-[9px] font-bold tracking-widest uppercase text-slate-400 mb-6">Seu Orçamento</span>

              <div className="flex-1 overflow-y-auto space-y-3">
                {cart.length === 0 ? (
                  <div className="h-48 border border-dashed border-white/5 rounded-2xl flex flex-col items-center justify-center p-6 text-center">
                    <span className="text-3xl mb-1 opacity-50">🛒</span>
                    <p className="text-xs font-bold text-slate-300">Nenhum item adicionado</p>
                    <p className="text-[10px] text-slate-500 mt-1">Configure o item ao lado e adicione ao carrinho para mandar em um único orçamento.</p>
                  </div>
                ) : (
                  cart.map(item => (
                    <div key={item.id} className="bg-slate-950 border border-white/5 rounded-xl p-3.5 relative group">
                      <div className="flex justify-between items-start gap-2">
                        <div>
                          <p className="text-xs font-extrabold text-white">{item.icon} {item.name}</p>
                          <p className="text-[9px] text-slate-400 mt-1 leading-tight">{item.specs.join(' · ')}</p>
                        </div>
                        <span className="text-xs font-mono font-bold text-white">R$ {formatCurrency(item.total)}</span>
                      </div>
                      
                      <div className="flex justify-end gap-2 border-t border-white/5 mt-3 pt-2">
                        <button onClick={() => handleEditCartItem(item.id)} className="text-[8.5px] text-blue-500 font-bold">✏️ Ajustar</button>
                        <button onClick={() => handleRemoveFromCart(item.id)} className="text-[8.5px] text-red-500 font-bold">🗑️ Remover</button>
                      </div>
                    </div>
                  ))
                )}
              </div>

              {/* CONTROLES TOTAIS DO ORÇAMENTO */}
              <div className="border-t border-white/5 pt-5 mt-4 shrink-0 bg-[#070A12]">
                <div className="bg-slate-950 border border-white/5 rounded-2xl p-4 mb-4">
                  <div className="flex justify-between items-baseline">
                    <span className="text-[10px] font-bold tracking-widest text-slate-400 uppercase">Subtotal Atual:</span>
                    <span className="text-xl font-black font-display text-white">R$ {formatCurrency(activeProductTotal)}</span>
                  </div>
                  <button
                    onClick={handleAddActiveToCart}
                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-xs py-3 rounded-xl mt-3 transition-colors shadow-lg shadow-blue-500/10"
                  >
                    Adicionar Item ao Carrinho
                  </button>
                </div>

                {cart.length > 0 && (
                  <div className="bg-gradient-to-br from-blue-900/10 to-indigo-950/10 border border-blue-500/20 rounded-2xl p-4">
                    <div className="flex justify-between items-baseline mb-2">
                      <span className="text-[10px] font-bold tracking-widest text-blue-400 uppercase">Total Estimado:</span>
                      <span className="text-2xl font-black font-display text-emerald-400">R$ {formatCurrency(cartTotal)}</span>
                    </div>
                    <p className="text-[9px] text-slate-400 leading-normal mb-3">🚚 Frete grátis para Guarujá para a maioria das regiões!</p>
                    <a 
                      href={getWppLink(buildCartWppMessage(cart))}
                      target="_blank" 
                      rel="noopener" 
                      className="w-full bg-[#25D366] hover:bg-emerald-500 text-white font-extrabold text-xs py-3 rounded-xl flex items-center justify-center gap-1.5 shadow-lg shadow-emerald-500/10 transition-colors"
                    >
                      Enviar Orçamento pelo WhatsApp
                    </a>
                    <button onClick={handleClearCart} className="w-full text-center text-slate-400 text-[9px] uppercase tracking-widest font-bold mt-2.5">🧹 Esvaziar Carrinho</button>
                  </div>
                )}
              </div>
            </aside>
          </div>
        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<MainApp />);
  </script>

  <!-- Notificações Flutuantes (Toasts) -->
  <div id="benefit-toast" style="display: none;"></div>
  <div id="cart-toast" style="display: none;"></div>

  <script type="text/javascript">
    window.addEventListener('load', () => {
      const bToast = document.getElementById('benefit-toast');
      const cToast = document.getElementById('cart-toast');

      let activeBTimeout, activeCTimeout;

      window.triggerBenefitToastJS = (icon, msg) => {
        clearTimeout(activeBTimeout);
        bToast.innerHTML = `<span class="mr-1.5 text-base">${icon}</span><span>${msg}</span>`;
        bToast.style.display = 'flex';
        bToast.style.opacity = '1';
        
        activeBTimeout = setTimeout(() => {
          bToast.style.opacity = '0';
          setTimeout(() => { bToast.style.display = 'none'; }, 300);
        }, 3000);
      };

      window.triggerCartToastJS = (msg) => {
        clearTimeout(activeCTimeout);
        cToast.innerHTML = `<span class="mr-1.5 text-base">🛒</span><span>${msg}</span>`;
        cToast.style.display = 'flex';
        cToast.style.opacity = '1';
        
        activeCTimeout = setTimeout(() => {
          cToast.style.opacity = '0';
          setTimeout(() => { cToast.style.display = 'none'; }, 300);
        }, 3000);
      };
    });
  </script>

</body>
</html>
