<style>

/* =====================================================
   RESET
===================================================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    font-family:'Inter',sans-serif;
    background:#F7FAFF;
    color:#1E293B;
    overflow-x:hidden;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
}

/* =====================================================
   VARIÁVEIS
===================================================== */

:root{

    --primary:#0B4EA2;
    --primary-dark:#083A79;

    --green:#16A34A;
    --green-dark:#15803D;

    --background:#F7FAFF;

    --white:#FFFFFF;

    --text:#0F172A;

    --gray:#64748B;

    --border:#E5E7EB;

    --radius:22px;

    --shadow:
        0 20px 50px rgba(15,23,42,.08);

    --transition:.35s ease;

}

/* =====================================================
   BASE
===================================================== */

body{

    background:var(--background);

}

img{

    max-width:100%;

    display:block;

}

a{

    text-decoration:none;

    color:inherit;

}

.container{

    width:min(1200px,92%);

    margin:auto;

}

section{

    padding:90px 0;

}

h1{

    font-size:clamp(2.8rem,6vw,4.8rem);

    line-height:1.05;

    font-weight:900;

    color:var(--text);

}

h2{

    font-size:clamp(2rem,4vw,3rem);

    font-weight:800;

    color:var(--text);

}

h3{

    font-size:1.35rem;

}

p{

    color:var(--gray);

    font-size:1.08rem;

}

/* =====================================================
   BOTÕES
===================================================== */

.btn{

    display:inline-flex;

    align-items:center;

    justify-content:center;

    gap:10px;

    padding:16px 34px;

    border-radius:999px;

    font-weight:700;

    transition:var(--transition);

    cursor:pointer;

}

.btn-primary{

    background:var(--green);

    color:#fff;

    box-shadow:0 18px 35px rgba(22,163,74,.25);

}

.btn-primary:hover{

    transform:translateY(-3px);

    background:var(--green-dark);

}

.btn-secondary{

    border:2px solid rgba(11,78,162,.15);

    background:#fff;

    color:var(--text);

}

.btn-secondary:hover{

    background:#EEF5FF;

}
/* =====================================================
   BARRA SUPERIOR
===================================================== */

.top-bar{

    width:100%;

    background:linear-gradient(90deg,#0B4EA2,#1677d8);

    color:#fff;

    text-align:center;

    padding:12px 20px;

    font-size:.95rem;

    font-weight:700;

    letter-spacing:.2px;

}

.top-bar strong{

    color:#ffffff;

}

/* =====================================================
   HEADER
===================================================== */

.header{

    position:fixed;

    top:42px;

    left:0;

    width:100%;

    z-index:999;

    transition:.35s ease;

}

.header.scrolled{

    background:rgba(255,255,255,.92);

    backdrop-filter:blur(18px);

    box-shadow:0 10px 35px rgba(0,0,0,.08);

}

.nav{

    display:flex;

    align-items:center;

    justify-content:space-between;

    min-height:82px;

}

.logo{

    display:flex;

    align-items:center;

    gap:14px;

}

.logo img{

    width:58px;

}

.logo span{

    font-size:1.15rem;

    font-weight:800;

    color:var(--primary);

}

.menu{

    display:flex;

    align-items:center;

    gap:34px;

}

.menu a{

    font-weight:600;

    color:var(--text);

    transition:.3s;

}

.menu a:hover{

    color:var(--primary);

}

.menu-whatsapp{

    margin-left:16px;

}

/* =====================================================
   HERO
===================================================== */

.hero{

    padding-top:190px;

    padding-bottom:110px;

    background:

    radial-gradient(circle at top right,

    rgba(22,163,74,.10),

    transparent 35%),

    radial-gradient(circle at left,

    rgba(11,78,162,.10),

    transparent 40%),

    #F7FAFF;

}

.hero-grid{

    display:grid;

    grid-template-columns:1.1fr .9fr;

    align-items:center;

    gap:70px;

}

.badge{

    display:inline-flex;

    align-items:center;

    gap:10px;

    padding:12px 18px;

    border-radius:999px;

    background:rgba(11,78,162,.08);

    color:var(--primary);

    font-weight:700;

    margin-bottom:28px;

}

.hero p{

    margin:28px 0 38px;

    max-width:620px;

}

.hero-buttons{

    display:flex;

    flex-wrap:wrap;

    gap:18px;

}

.hero-right{

    position:relative;

    min-height:540px;

    display:flex;

    justify-content:center;

    align-items:center;

}

.hero-logo{

    width:250px;

    filter:drop-shadow(0 25px 40px rgba(11,78,162,.18));

}

.float-card{

    position:absolute;

    background:#fff;

    border-radius:24px;

    padding:16px;

    box-shadow:var(--shadow);

    animation:float 6s ease-in-out infinite;

}

.float-card img{

    width:170px;

}

.sulfite{

    top:0;

    right:10px;

}

.cartao{

    left:0;

    bottom:120px;

    animation-delay:2s;

}

.panfleto{

    right:20px;

    bottom:0;

    animation-delay:4s;

}

@keyframes float{

    0%{

        transform:translateY(0px);

    }

    50%{

        transform:translateY(-14px);

    }

    100%{

        transform:translateY(0px);

    }

}

/* =====================================================
   RESPONSIVO
===================================================== */

@media(max-width:992px){

    .hero-grid{

        grid-template-columns:1fr;

        text-align:center;

    }

    .hero-buttons{

        justify-content:center;

    }

    .hero-right{

        margin-top:40px;

        min-height:420px;

    }

    .menu{

        display:none;

    }

}

@media(max-width:768px){

    section{

        padding:70px 0;

    }

    .hero{

        padding-top:160px;

    }

    .hero-logo{

        width:180px;

    }

    .float-card img{

        width:120px;

    }

}
